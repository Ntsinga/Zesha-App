<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    TELEBA ADAPTIVE ICON FOREGROUND
    - Background: transparent (set backgroundColor="#9A0E1F" in app.json)
    - All content sits within the inner 66% safe zone (x:179–845, y:179–845)
    - Use this as adaptiveIcon.foregroundImage in app.json
  -->
  <defs>
    <linearGradient id="tGrad" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="30%" style="stop-color:#F0F0F0"/>
      <stop offset="70%" style="stop-color:#D8D8D8"/>
      <stop offset="100%" style="stop-color:#B0B0B0"/>
    </linearGradient>
    <linearGradient id="tShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9"/>
      <stop offset="45%" style="stop-color:#FFFFFF;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE566"/>
      <stop offset="50%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <filter id="tShadow" x="-20%" y="-15%" width="145%" height="145%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Transparent background -->

  <!-- T crossbar — centered, within safe zone -->
  <g filter="url(#tShadow)">
    <rect x="268" y="310" width="488" height="128" rx="22" ry="22" fill="url(#tGrad)"/>
    <rect x="443" y="310" width="138" height="400" rx="22" ry="22" fill="url(#tGrad)"/>
  </g>

  <!-- T shine -->
  <rect x="268" y="310" width="488" height="52" rx="22" ry="22" fill="url(#tShine)" opacity="0.62"/>
  <rect x="443" y="310" width="62" height="400" rx="14" ry="14" fill="url(#tShine)" opacity="0.28"/>

  <!-- Gold signal arcs — inside safe zone -->
  <g filter="url(#goldGlow)" transform="translate(634, 520)">
    <circle cx="0" cy="56" r="11" fill="#FFD700"/>
    <path d="M14,42 Q44,14 78,2"   fill="none" stroke="#FFD700" stroke-width="13" stroke-linecap="round"/>
    <path d="M14,62 Q58,18 104,4"  fill="none" stroke="#FFD700" stroke-width="10" stroke-linecap="round" opacity="0.68"/>
    <path d="M14,84 Q74,26 132,8"  fill="none" stroke="#FFD700" stroke-width="7"  stroke-linecap="round" opacity="0.38"/>
  </g>
</svg>
