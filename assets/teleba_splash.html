<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Teleba — Splash Screen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;600&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red-top:    #C8162D;
    --red-mid:    #8E0C1A;
    --red-deep:   #520610;
    --gold:       #FFD700;
    --gold-light: #FFE566;
    --gold-dark:  #B8860B;
    --white:      #FFFFFF;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--red-deep);
  }

  .splash {
    position: relative;
    width: 100%; height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(145deg, var(--red-top) 0%, var(--red-mid) 50%, var(--red-deep) 100%);
    overflow: hidden;
  }

  /* ── BACKGROUND DECORATIVE RINGS ── */
  .rings {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.06);
    transform: translate(-50%, -50%);
    animation: ringPulse 4s ease-in-out infinite;
  }
  .ring:nth-child(1) { width: 900px; height: 900px; top: 50%; left: 50%; animation-delay: 0s; }
  .ring:nth-child(2) { width: 700px; height: 700px; top: 50%; left: 50%; border-color: rgba(255,215,0,0.08); animation-delay: 0.4s; }
  .ring:nth-child(3) { width: 520px; height: 520px; top: 50%; left: 50%; animation-delay: 0.8s; }

  /* corner accent circles */
  .corner-circle {
    position: absolute;
    border-radius: 50%;
    border: 1.2px solid rgba(255,255,255,0.05);
  }
  .cc-tl { width: 420px; height: 420px; top: -140px; left: -140px; }
  .cc-br { width: 460px; height: 460px; bottom: -160px; right: -160px; }

  @keyframes ringPulse {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.015); }
  }

  /* ── SUBTLE GRID ── */
  .grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  /* ── CENTER GLOW ── */
  .center-glow {
    position: absolute;
    width: 600px; height: 560px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse at center, rgba(255,60,60,0.22) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── TOP LIGHT LEAK ── */
  .top-leak {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 55%;
    background: radial-gradient(ellipse at 30% 0%, rgba(255,120,120,0.14) 0%, transparent 65%);
    pointer-events: none;
  }

  /* ── VIGNETTE ── */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.5) 100%);
    pointer-events: none;
  }

  /* ── LOGO CONTAINER ── */
  .logo-wrap {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) both;
    animation-delay: 0.2s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── ICON ── */
  .icon-box {
    position: relative;
    width: 140px; height: 140px;
    animation: iconDrop 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    animation-delay: 0.1s;
  }

  @keyframes iconDrop {
    from { opacity: 0; transform: scale(0.7) translateY(-20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .icon-svg {
    width: 140px; height: 140px;
    filter: drop-shadow(0 18px 36px rgba(0,0,0,0.45));
    border-radius: 32px;
  }

  /* Gold halo behind icon */
  .icon-halo {
    position: absolute;
    width: 180px; height: 180px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(255,215,0,0.18) 0%, transparent 70%);
    border-radius: 50%;
    animation: haloBreath 3s ease-in-out infinite;
    animation-delay: 1.2s;
  }

  @keyframes haloBreath {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.12); }
  }

  /* ── BRAND NAME ── */
  .brand-name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: clamp(52px, 10vw, 76px);
    font-weight: 700;
    letter-spacing: 0.12em;
    background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 2px 12px rgba(255,215,0,0.35));
    animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) both;
    animation-delay: 0.45s;
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 14px;
    animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) both;
    animation-delay: 0.6s;
  }
  .divider-line {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,215,0,0.6), transparent);
  }
  .divider-diamond {
    width: 7px; height: 7px;
    background: var(--gold);
    transform: rotate(45deg);
    opacity: 0.85;
  }

  /* ── TAGLINE ── */
  .tagline {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(11px, 2vw, 14px);
    font-weight: 300;
    letter-spacing: 0.28em;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) both;
    animation-delay: 0.7s;
  }

  /* ── LOADING BAR ── */
  .loader-wrap {
    position: absolute;
    bottom: 72px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    z-index: 10;
    animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) both;
    animation-delay: 0.9s;
  }

  .loader-track {
    width: 180px; height: 2px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }

  .loader-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light));
    border-radius: 2px;
    animation: loadFill 2.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    animation-delay: 1.1s;
    box-shadow: 0 0 10px rgba(255,215,0,0.5);
  }

  @keyframes loadFill {
    0%   { width: 0%; }
    60%  { width: 75%; }
    85%  { width: 90%; }
    100% { width: 100%; }
  }

  .loader-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }

  /* ── GOLD SIGNAL ARCS (from icon, echoed here) ── */
  .signal-arcs {
    position: absolute;
    bottom: 200px;
    right: calc(50% - 90px);
    z-index: 5;
    animation: fadeUp 1s ease both;
    animation-delay: 1s;
    opacity: 0.55;
  }
</style>
</head>
<body>
<div class="splash">

  <!-- Background layers -->
  <div class="grid-overlay"></div>
  <div class="top-leak"></div>
  <div class="center-glow"></div>

  <div class="rings">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
  </div>

  <div class="corner-circle cc-tl"></div>
  <div class="corner-circle cc-br"></div>

  <!-- Main logo content -->
  <div class="logo-wrap">

    <!-- Icon -->
    <div class="icon-box">
      <div class="icon-halo"></div>
      <svg class="icon-svg" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="iBg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#C0152A"/>
            <stop offset="50%" style="stop-color:#9A0E1F"/>
            <stop offset="100%" style="stop-color:#6B0714"/>
          </linearGradient>
          <linearGradient id="iGold" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFE566"/>
            <stop offset="50%" style="stop-color:#FFD700"/>
            <stop offset="100%" style="stop-color:#B8860B"/>
          </linearGradient>
          <linearGradient id="iT" x1="10%" y1="0%" x2="90%" y2="100%">
            <stop offset="0%" style="stop-color:#FFFFFF"/>
            <stop offset="30%" style="stop-color:#F0F0F0"/>
            <stop offset="70%" style="stop-color:#D8D8D8"/>
            <stop offset="100%" style="stop-color:#B0B0B0"/>
          </linearGradient>
          <linearGradient id="iTShine" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9"/>
            <stop offset="40%" style="stop-color:#FFFFFF;stop-opacity:0.3"/>
            <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
          </linearGradient>
          <filter id="iShadow">
            <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
          </filter>
          <filter id="iGlow">
            <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <clipPath id="iClip">
            <rect width="1024" height="1024" rx="220" ry="220"/>
          </clipPath>
          <radialGradient id="iVig" cx="50%" cy="50%" r="70%">
            <stop offset="55%" style="stop-color:#000000;stop-opacity:0"/>
            <stop offset="100%" style="stop-color:#000000;stop-opacity:0.45"/>
          </radialGradient>
        </defs>
        <g clip-path="url(#iClip)">
          <rect width="1024" height="1024" fill="url(#iBg)"/>
          <circle cx="120" cy="140" r="280" fill="none" stroke="#FFF" stroke-width="1.5" opacity="0.06"/>
          <circle cx="900" cy="880" r="300" fill="none" stroke="#FFF" stroke-width="1.5" opacity="0.06"/>
          <ellipse cx="512" cy="490" rx="320" ry="300" fill="rgba(255,59,59,0.28)"/>
          <circle cx="512" cy="512" r="430" fill="none" stroke="url(#iGold)" stroke-width="2.5" opacity="0.4" stroke-dasharray="680 2020"/>
          <path d="M512 200 L690 278 L690 460 Q690 578 512 648 Q334 578 334 460 L334 278 Z" fill="rgba(255,215,0,0.12)" stroke="url(#iGold)" stroke-width="2.5" opacity="0.5"/>
          <g filter="url(#iShadow)">
            <rect x="248" y="255" width="528" height="142" rx="24" ry="24" fill="url(#iT)"/>
            <rect x="441" y="255" width="142" height="470" rx="24" ry="24" fill="url(#iT)"/>
          </g>
          <rect x="248" y="255" width="528" height="60" rx="24" ry="24" fill="url(#iTShine)" opacity="0.6"/>
          <rect x="441" y="255" width="65" height="470" rx="12" ry="12" fill="url(#iTShine)" opacity="0.3"/>
          <g filter="url(#iGlow)" opacity="0.85" transform="translate(686,560)">
            <path d="M0,50 Q20,20 50,0" fill="none" stroke="url(#iGold)" stroke-width="5" stroke-linecap="round"/>
            <path d="M0,80 Q40,30 80,0" fill="none" stroke="url(#iGold)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
            <path d="M0,110 Q60,40 110,0" fill="none" stroke="url(#iGold)" stroke-width="5" stroke-linecap="round" opacity="0.45"/>
            <circle cx="0" cy="50" r="6" fill="#FFD700"/>
          </g>
          <rect width="1024" height="1024" fill="url(#iVig)"/>
        </g>
      </svg>
    </div>

    <!-- Brand name -->
    <div class="brand-name">TELEBA</div>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>

    <!-- Tagline -->
    <div class="tagline">Telecom &amp; Agency Banking</div>

  </div>

  <!-- Loading indicator -->
  <div class="loader-wrap">
    <div class="loader-track">
      <div class="loader-bar"></div>
    </div>
    <div class="loader-label">Initializing</div>
  </div>

  <!-- Vignette last -->
  <div class="vignette"></div>
</div>
</body>
</html>
