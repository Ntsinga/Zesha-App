<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C0152A"/>
      <stop offset="50%" style="stop-color:#9A0E1F"/>
      <stop offset="100%" style="stop-color:#6B0714"/>
    </linearGradient>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE566"/>
      <stop offset="50%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>

    <linearGradient id="tGrad" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="30%" style="stop-color:#F0F0F0"/>
      <stop offset="70%" style="stop-color:#D8D8D8"/>
      <stop offset="100%" style="stop-color:#B0B0B0"/>
    </linearGradient>

    <linearGradient id="tShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9"/>
      <stop offset="45%" style="stop-color:#FFFFFF;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>

    <radialGradient id="centerGlow" cx="50%" cy="48%" r="44%">
      <stop offset="0%" style="stop-color:#FF3B3B;stop-opacity:0.28"/>
      <stop offset="100%" style="stop-color:#FF0000;stop-opacity:0"/>
    </radialGradient>

    <radialGradient id="topLeak" cx="30%" cy="0%" r="55%">
      <stop offset="0%" style="stop-color:#FF7070;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#FF0000;stop-opacity:0"/>
    </radialGradient>

    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="50%" style="stop-color:#000000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.52"/>
    </radialGradient>

    <filter id="tShadow" x="-20%" y="-15%" width="145%" height="145%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000000" flood-opacity="0.42"/>
    </filter>

    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="roundedClip">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedClip)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>
    <rect width="1024" height="580" fill="url(#topLeak)"/>

    <!-- Subtle background rings for depth -->
    <circle cx="512" cy="512" r="445" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.05"/>
    <circle cx="512" cy="512" r="355" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.04"/>
    <circle cx="150" cy="160" r="260" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.05"/>
    <circle cx="874" cy="860" r="280" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.05"/>

    <!-- Center warm glow -->
    <ellipse cx="512" cy="490" rx="350" ry="330" fill="url(#centerGlow)"/>

    <!-- ══ T LETTERMARK — centred, balanced, room to breathe ══ -->
    <g filter="url(#tShadow)">
      <!-- Crossbar -->
      <rect x="268" y="288" width="488" height="138" rx="24" ry="24" fill="url(#tGrad)"/>
      <!-- Stem -->
      <rect x="443" y="288" width="138" height="448" rx="24" ry="24" fill="url(#tGrad)"/>
    </g>
    <!-- Shine crossbar -->
    <rect x="268" y="288" width="488" height="56" rx="24" ry="24" fill="url(#tShine)" opacity="0.62"/>
    <!-- Shine stem -->
    <rect x="443" y="288" width="62" height="448" rx="14" ry="14" fill="url(#tShine)" opacity="0.28"/>

    <!-- ══ GOLD SIGNAL ARCS — bold, bottom-right, clear at small sizes ══ -->
    <g filter="url(#goldGlow)" transform="translate(648, 548)">
      <!-- Anchor dot -->
      <circle cx="0" cy="62" r="12" fill="#FFD700"/>
      <!-- Arc 1 -->
      <path d="M 16,46 Q 50,14 88,2"
            fill="none" stroke="#FFD700" stroke-width="14" stroke-linecap="round"/>
      <!-- Arc 2 -->
      <path d="M 16,68 Q 64,20 116,4"
            fill="none" stroke="#FFD700" stroke-width="11" stroke-linecap="round" opacity="0.68"/>
      <!-- Arc 3 -->
      <path d="M 16,92 Q 82,28 148,8"
            fill="none" stroke="#FFD700" stroke-width="8" stroke-linecap="round" opacity="0.38"/>
    </g>

    <!-- Vignette -->
    <rect width="1024" height="1024" fill="url(#vignette)"/>
  </g>
</svg>
