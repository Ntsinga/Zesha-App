<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C0152A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9A0E1F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B0714;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700" />
      <stop offset="40%" style="stop-color:#FFC107" />
      <stop offset="100%" style="stop-color:#B8860B" />
    </linearGradient>

    <linearGradient id="tGrad" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF" />
      <stop offset="30%" style="stop-color:#F0F0F0" />
      <stop offset="70%" style="stop-color:#D8D8D8" />
      <stop offset="100%" style="stop-color:#B0B0B0" />
    </linearGradient>

    <linearGradient id="tHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9" />
      <stop offset="40%" style="stop-color:#FFFFFF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </linearGradient>

    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#FFC107;stop-opacity:0.05" />
    </linearGradient>

    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE566" />
      <stop offset="50%" style="stop-color:#FFD700" />
      <stop offset="100%" style="stop-color:#C8960C" />
    </linearGradient>

    <filter id="tShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <filter id="goldGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="centerGlow" cx="50%" cy="48%" r="38%">
      <stop offset="0%" style="stop-color:#FF3B3B;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#FF0000;stop-opacity:0" />
    </radialGradient>

    <radialGradient id="topLeak" cx="30%" cy="0%" r="55%">
      <stop offset="0%" style="stop-color:#FF8080;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#FF0000;stop-opacity:0"/>
    </radialGradient>

    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="55%" style="stop-color:#000000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.45"/>
    </radialGradient>

    <clipPath id="roundedClip">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedClip)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>
    <rect width="1024" height="600" fill="url(#topLeak)"/>

    <!-- Decorative circles -->
    <circle cx="120" cy="140" r="280" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.06"/>
    <circle cx="120" cy="140" r="200" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.05"/>
    <circle cx="900" cy="880" r="300" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.06"/>
    <circle cx="900" cy="880" r="210" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.04"/>

    <!-- Subtle cross lines -->
    <line x1="0" y1="512" x2="1024" y2="512" stroke="#FFFFFF" stroke-width="0.8" opacity="0.04"/>
    <line x1="512" y1="0" x2="512" y2="1024" stroke="#FFFFFF" stroke-width="0.8" opacity="0.04"/>

    <!-- Central radial glow -->
    <ellipse cx="512" cy="490" rx="320" ry="300" fill="url(#centerGlow)"/>

    <!-- Gold accent ring -->
    <circle cx="512" cy="512" r="430" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" opacity="0.45" stroke-dasharray="680 2020"/>
    <circle cx="512" cy="512" r="400" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.2"/>

    <!-- Shield -->
    <path d="M512 200 L690 278 L690 460 Q690 578 512 648 Q334 578 334 460 L334 278 Z"
          fill="url(#shieldGrad)"
          stroke="url(#goldGrad)"
          stroke-width="2.5"
          opacity="0.5"/>

    <!-- T lettermark -->
    <g filter="url(#tShadow)">
      <rect x="248" y="255" width="528" height="142" rx="24" ry="24" fill="url(#tGrad)"/>
      <rect x="441" y="255" width="142" height="470" rx="24" ry="24" fill="url(#tGrad)"/>
    </g>

    <!-- T glass shine -->
    <rect x="248" y="255" width="528" height="60" rx="24" ry="24" fill="url(#tHighlight)" opacity="0.6"/>
    <rect x="441" y="255" width="65" height="470" rx="12" ry="12" fill="url(#tHighlight)" opacity="0.3"/>

    <!-- Gold signal arcs -->
    <g filter="url(#goldGlow)" opacity="0.85" transform="translate(686, 560)">
      <path d="M0,50 Q20,20 50,0" fill="none" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round"/>
      <path d="M0,80 Q40,30 80,0" fill="none" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
      <path d="M0,110 Q60,40 110,0" fill="none" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round" opacity="0.45"/>
      <circle cx="0" cy="50" r="6" fill="#FFD700"/>
    </g>

    <!-- Small gold sparkle -->
    <g transform="translate(512, 820)" opacity="0.7">
      <polygon points="0,-10 2.4,-2.4 10,0 2.4,2.4 0,10 -2.4,2.4 -10,0 -2.4,-2.4" fill="#FFD700"/>
    </g>

    <!-- Vignette -->
    <rect width="1024" height="1024" fill="url(#vignette)"/>
  </g>
</svg>
